// ============ AI EXPORT ============
function buildMarkdown(scope) {
  const today = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  let md = '';

  if (scope === 'all') {
    md = `# Atlas — Full Context Snapshot\n*Generated ${today}*\n\nThis is a complete snapshot of my personal hub: tasks, projects, learning, ideas, and wishlist. Use this as context for advice, planning, or research.\n\n`;
    md += sectionTasks();
    md += sectionProjects('long');
    md += sectionProjects('short');
    md += sectionLearning();
    md += sectionIdeas();
    md += sectionWishlist();
  } else if (scope === 'tasks') {
    md = `# My Tasks\n*Generated ${today}*\n\n` + sectionTasks();
  } else if (scope === 'projects-long') {
    md = `# My Long Term Projects\n*Generated ${today}*\n\n` + sectionProjects('long');
  } else if (scope === 'projects-short') {
    md = `# My Short Term Projects\n*Generated ${today}*\n\n` + sectionProjects('short');
  } else if (scope === 'learning') {
    md = `# My Learning Tracks\n*Generated ${today}*\n\n` + sectionLearning();
  } else if (scope === 'ideas') {
    md = `# My Idea Center\n*Generated ${today}*\n\n` + sectionIdeas();
  } else if (scope === 'wishlist') {
    md = `# My Wishlist\n*Generated ${today}*\n\n` + sectionWishlist();
  } else if (scope.startsWith('project:')) {
    md = sectionSingleProject(scope.split(':')[1], today);
  } else if (scope.startsWith('learning:')) {
    md = sectionSingleLearning(scope.split(':')[1], today);
  }
  return md;
}

function sectionTasks() {
  const open = state.tasks.filter(t => !t.done);
  if (open.length === 0) return `## Tasks\n*No open tasks.*\n\n`;
  let s = `## Tasks (Open)\n\n`;
  open.forEach(t => {
    const project = t.projectId ? state.projects.find(p => p.id === t.projectId) : null;
    const meta = [
      t.priority && `priority: ${t.priority}`,
      t.due && `due: ${fmtDate(t.due)}${isOverdue(t.due) ? ' (OVERDUE)' : ''}`,
      project && `project: ${project.title}`
    ].filter(Boolean).join(', ');
    s += `- ${t.title}${meta ? ` *(${meta})*` : ''}\n`;
  });
  return s + '\n';
}

function sectionProjects(type) {
  const list = state.projects.filter(p => p.type === type && !p.parentId);
  const heading = type === 'long' ? '## Long Term Projects' : '## Short Term Projects';
  if (list.length === 0) return `${heading}\n*None yet.*\n\n`;
  let s = `${heading}\n\n`;
  list.forEach(p => { s += projectToMd(p, 3); });
  return s;
}

function projectToMd(p, level) {
  const hash = '#'.repeat(level);
  const allTasks = getProjectTasks(p.id);
  const done = allTasks.filter(t => t.done).length;
  const progress = allTasks.length > 0 ? Math.round((done/allTasks.length)*100) : 0;
  const subprojects = state.projects.filter(s => s.parentId === p.id);
  const directTasks = state.tasks.filter(t => t.projectId === p.id);
  const notes = p.notes || [];
  const links = p.links || [];

  let s = `${hash} ${p.title}\n`;
  if (p.description) s += `${p.description}\n\n`;
  const meta = [
    p.deadline && `**Deadline:** ${fmtDate(p.deadline)}`,
    p.estimate && `**Estimate:** ${p.estimate}`,
    `**Progress:** ${done}/${allTasks.length} tasks (${progress}%)`
  ].filter(Boolean);
  if (meta.length) s += meta.join(' · ') + '\n\n';

  if (directTasks.length > 0) {
    s += `**Tasks:**\n`;
    directTasks.forEach(t => {
      s += `- ${t.done ? '[x]' : '[ ]'} ${t.title}${t.priority ? ` *(${t.priority})*` : ''}${t.due ? ` *(due ${fmtDate(t.due)})*` : ''}\n`;
    });
    s += '\n';
  }
  if (notes.length > 0) {
    s += `**Notes:**\n`;
    notes.forEach(n => { s += `- *${fmtDateTime(n.created)}:* ${n.content.replace(/\n/g, '\n  ')}\n`; });
    s += '\n';
  }
  if (links.length > 0) {
    s += `**Links:**\n`;
    links.forEach(l => { s += `- [${l.title}](${l.url})\n`; });
    s += '\n';
  }
  if (subprojects.length > 0) {
    subprojects.forEach(sub => { s += projectToMd(sub, level + 1); });
  }
  return s;
}

function sectionSingleProject(id, today) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return '';
  let s = `# ${p.title}\n*Generated ${today}*\n\n`;
  if (p.description) s += `${p.description}\n\n`;
  s += `**Type:** ${p.type === 'long' ? 'Long Term' : 'Short Term'}\n`;
  if (p.deadline) s += `**Deadline:** ${fmtDate(p.deadline)}\n`;
  if (p.estimate) s += `**Estimate:** ${p.estimate}\n`;
  s += '\n---\n\n' + projectToMd(p, 2).split('\n').slice(2).join('\n');
  return s;
}

function sectionLearning() {
  if (state.learning.length === 0) return `## Learning Tracks\n*None yet.*\n\n`;
  let s = `## Learning Tracks\n\n`;
  state.learning.forEach(l => { s += learningToMd(l, 3); });
  return s;
}

function learningToMd(l, level) {
  const hash = '#'.repeat(level);
  const milestones = l.milestones || [];
  const done = milestones.filter(m => m.done).length;
  const progress = milestones.length > 0 ? Math.round((done/milestones.length)*100) : 0;
  let s = `${hash} ${l.title}\n`;
  if (l.description) s += `${l.description}\n\n`;
  const meta = [
    l.why && `**Why:** ${l.why}`,
    l.timeframe && `**Timeframe:** ${l.timeframe}`,
    `**Progress:** ${done}/${milestones.length} milestones (${progress}%)`
  ].filter(Boolean);
  if (meta.length) s += meta.join(' · ') + '\n\n';
  if (milestones.length > 0) {
    s += `**Milestones:**\n`;
    milestones.forEach(m => { s += `- ${m.done ? '[x]' : '[ ]'} ${m.text}\n`; });
    s += '\n';
  }
  return s;
}

function sectionSingleLearning(id, today) {
  const l = state.learning.find(x => x.id === id);
  if (!l) return '';
  return `# Learning: ${l.title}\n*Generated ${today}*\n\n` + learningToMd(l, 2).split('\n').slice(2).join('\n');
}

function sectionIdeas() {
  if (state.ideas.length === 0) return `## Ideas\n*No ideas captured yet.*\n\n`;
  let s = `## Ideas\n\n`;
  state.buckets.forEach(b => {
    const bucketIdeas = state.ideas.filter(i => i.bucketId === b.id);
    if (bucketIdeas.length === 0) return;
    s += `### ${b.title}\n`;
    if (b.description) s += `*${b.description}*\n\n`;
    bucketIdeas.sort((a,b) => b.created - a.created).forEach(i => {
      s += `- ${i.content.replace(/\n/g, '\n  ')} *(${fmtDateTime(i.created)})*\n`;
    });
    s += '\n';
  });
  const unbucketed = state.ideas.filter(i => !i.bucketId);
  if (unbucketed.length > 0) {
    s += `### Unbucketed\n`;
    unbucketed.sort((a,b) => b.created - a.created).forEach(i => {
      s += `- ${i.content.replace(/\n/g, '\n  ')} *(${fmtDateTime(i.created)})*\n`;
    });
    s += '\n';
  }
  return s;
}

function sectionWishlist() {
  const open = state.wishlist.filter(w => !w.done);
  const done = state.wishlist.filter(w => w.done);
  if (open.length === 0 && done.length === 0) return `## Wishlist\n*Empty.*\n\n`;
  let s = `## Wishlist\n\n`;
  if (open.length > 0) {
    s += `### Active\n\n`;
    open.forEach(w => {
      s += `- **${w.title}**`;
      const meta = [w.category, w.timeframe].filter(Boolean).join(' · ');
      if (meta) s += ` *(${meta})*`;
      s += '\n';
      if (w.description) s += `  ${w.description.replace(/\n/g, '\n  ')}\n`;
    });
    s += '\n';
  }
  if (done.length > 0) {
    s += `### Achieved\n\n`;
    done.forEach(w => { s += `- ✓ ${w.title}\n`; });
    s += '\n';
  }
  return s;
}

function openAIExport(scope) {
  const md = buildMarkdown(scope);
  const titles = {
    all: 'Everything', tasks: 'Tasks',
    'projects-long': 'Long Term Projects', 'projects-short': 'Short Term Projects',
    learning: 'Learning Tracks', ideas: 'Ideas', wishlist: 'Wishlist'
  };
  let title = titles[scope] || 'Selection';
  if (scope.startsWith('project:')) {
    const p = state.projects.find(x => x.id === scope.split(':')[1]);
    if (p) title = `Project: ${p.title}`;
  } else if (scope.startsWith('learning:')) {
    const l = state.learning.find(x => x.id === scope.split(':')[1]);
    if (l) title = `Learning: ${l.title}`;
  }

  showModal(`
    <h3>↗ Send to AI: ${escapeHtml(title)}</h3>
    <div class="ai-export-hint">Markdown formatted for Claude, NotebookLM, ChatGPT, or any AI tool.</div>
    <textarea class="ai-export-textarea" id="ai-export-text">${escapeHtml(md)}</textarea>
    <div class="ai-export-actions">
      <button class="btn-primary" onclick="copyAIExport()">Copy</button>
      <button class="btn-secondary" onclick="downloadAIExport('${scope}')">Download .md</button>
      <button class="btn-secondary" style="margin-left:auto" onclick="closeModal()">Close</button>
    </div>
  `);
}

function copyAIExport() {
  const text = document.getElementById('ai-export-text').value;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied. Paste into Claude or NotebookLM.');
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text) {
  const ta = document.getElementById('ai-export-text');
  ta.select();
  try { document.execCommand('copy'); showToast('Copied.'); }
  catch(e) { showToast('Copy failed, please select and copy manually'); }
}

function downloadAIExport(scope) {
  const text = document.getElementById('ai-export-text').value;
  const blob = new Blob([text], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `atlas-${scope.replace(':', '-')}-${date}.md`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Markdown downloaded');
}

// ============ MODAL ============
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  overlay.addEventListener('click', closeModal);
  document.body.appendChild(overlay);
}
function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ============ MOBILE MENU ============
function openMobileMenu() {
  document.getElementById('mobile-menu').classList.add('open');
  document.querySelector('.mobile-menu-overlay').classList.add('open');
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.querySelector('.mobile-menu-overlay').classList.remove('open');
}

// ============ FAB ============
function handleFab() {
  // Context-aware: action depends on current view
  if (state.currentProject) {
    state.currentProjectTab = 'tasks';
    render();
    setTimeout(() => document.getElementById('ptask-input')?.focus(), 100);
    return;
  }
  switch(state.currentView) {
    case 'tasks': setView('tasks'); setTimeout(()=>document.getElementById('task-input')?.focus(),100); break;
    case 'long': openProjectModal('long'); break;
    case 'short': openProjectModal('short'); break;
    case 'ideas': setView('ideas'); setTimeout(()=>document.getElementById('idea-input')?.focus(),100); break;
    case 'wishlist': openWishlistModal(); break;
    case 'learning': openLearningModal(); break;
    case 'dashboard':
    default:
      setView('tasks');
      setTimeout(()=>document.getElementById('task-input')?.focus(),100);
  }
}

// ============ NAV ============
function setView(view) {
  state.currentView = view;
  state.currentProject = null;
  render();
}

document.querySelectorAll('.nav-item[data-view], .bn-item[data-view]').forEach(el => {
  el.addEventListener('click', () => setView(el.dataset.view));
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeMobileMenu(); }
});

// Globals
Object.assign(window, {
  setView, addTask, toggleTask, deleteTask, clearDone,
  openProjectModal, createProject, editProject, saveProjectEdit, deleteProject,
  openProject, addProjectTask, addProjectNote, deleteProjectNote, addProjectLink, deleteProjectLink,
  openLearningModal, createLearning, editLearning, saveLearningEdit, deleteLearning,
  addMilestone, toggleMilestone, deleteMilestone,
  closeModal, exportData, importData, quickCaptureIdea,
  addIdea, deleteIdea, moveIdea, confirmMoveIdea,
  openBucketModal, createBucket, renameBucket, saveBucketEdit, deleteBucket,
  openWishlistModal, createWish, editWish, saveWishEdit, toggleWish, deleteWish,
  openAIExport, copyAIExport, downloadAIExport,
  openSyncSettings, saveSyncSettings, signInToGoogle, signOutGoogle, manualSync,
  openMobileMenu, closeMobileMenu, handleFab
});

// Init
loadSettings();
loadAll();
</script>
